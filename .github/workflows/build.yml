# Build a debug APK on every push / PR / manual dispatch.
# The APK is uploaded as a GitHub Actions artifact that you can download
# straight from the Actions tab — no AIDE Pro, no PC, no signing setup needed.

name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Lets you trigger it manually from the Actions tab

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      # AGP 3.5.3 officially supports JDK 8-11. JDK 17 breaks it because
      # javax.xml.bind was removed. JDK 11 (Temurin) is the safe choice.
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      # setup-gradle installs the Gradle version we pin (5.4.1) and adds
      # it to PATH. This means we can call `gradle` directly — no wrapper
      # jar required. The action also auto-caches ~/.gradle/caches between
      # runs so subsequent builds are ~3x faster.
      - name: Set up Gradle 5.4.1
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '5.4.1'
          cache-disabled: false

      - name: Grant execute permission for gradlew (if present)
        run: chmod +x ./gradlew 2>/dev/null || true

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Run unit tests (if any)
        run: gradle test --no-daemon || true

      # The APK ends up at app/build/outputs/apk/debug/app-debug.apk
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mytube-offline-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      # Also upload the mapping file for future ProGuard / R8 debugging
      - name: Upload build reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            build/reports/
          if-no-files-found: ignore
          retention-days: 7
